<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>카드 미리보기</title>
<style>
body { background:#0e3b1f; color:#fff; font-family:sans-serif; padding:20px; }
.row { display:flex; gap:20px; align-items:center; margin:20px 0; }
.box { text-align:center; }
.box img { border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.4); }
.box .label { margin-top:8px; font-size:14px; }
h1 { color:#ffd54a; }
.sizes { display:flex; gap:14px; align-items:flex-end; }
</style>
</head>
<body>
<h1>1월 송학광 (샘플)</h1>
<div class="sizes">
  <div class="box"><img src="01-gwang.svg" width="50" height="75"><div class="label">50×75 (모바일)</div></div>
  <div class="box"><img src="01-gwang.svg" width="64" height="96"><div class="label">64×96 (데스크톱)</div></div>
  <div class="box"><img src="01-gwang.svg" width="120" height="180"><div class="label">120×180 (확대)</div></div>
  <div class="box"><img src="01-gwang.svg" width="240" height="360"><div class="label">240×360 (원본 확인)</div></div>
</div>
</body>
</html>
