<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <!-- frame -->
  <rect x="1" y="1" width="78" height="118" rx="7" ry="7" fill="#1a1a1a" stroke="#000" stroke-width="2"/>
  <rect x="3.5" y="3.5" width="73" height="113" rx="5" ry="5" fill="#0f0f0f"/>

  <!-- sky gradient bg -->
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a4d"/>
      <stop offset="1" stop-color="#1a1a22"/>
    </linearGradient>
    <radialGradient id="sun1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd84a"/>
      <stop offset="0.6" stop-color="#e04b26"/>
      <stop offset="1" stop-color="#8a1a10"/>
    </radialGradient>
  </defs>
  <rect x="3.5" y="3.5" width="73" height="113" rx="5" ry="5" fill="url(#sky1)"/>

  <!-- sun -->
  <circle cx="55" cy="32" r="14" fill="url(#sun1)"/>
  <circle cx="55" cy="32" r="14" fill="none" stroke="#2a0800" stroke-width="0.6"/>

  <!-- pine tree trunk -->
  <path d="M21,96 Q20,70 22,50 Q24,42 22,30" stroke="#3d2817" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  <!-- pine clusters -->
  <g>
    <ellipse cx="20" cy="32" rx="9" ry="6" fill="#1e5f2e" stroke="#0a2e14" stroke-width="0.6"/>
    <ellipse cx="26" cy="44" rx="10" ry="6" fill="#256b34" stroke="#0a2e14" stroke-width="0.6"/>
    <ellipse cx="17" cy="54" rx="10" ry="6" fill="#1e5f2e" stroke="#0a2e14" stroke-width="0.6"/>
    <ellipse cx="24" cy="66" rx="11" ry="6.5" fill="#256b34" stroke="#0a2e14" stroke-width="0.6"/>
    <ellipse cx="18" cy="78" rx="10" ry="6" fill="#1e5f2e" stroke="#0a2e14" stroke-width="0.6"/>
  </g>
  <!-- pine needle dots for texture -->
  <g fill="#103a1e" opacity="0.6">
    <circle cx="18" cy="32" r="0.7"/><circle cx="23" cy="34" r="0.7"/>
    <circle cx="26" cy="45" r="0.7"/><circle cx="29" cy="42" r="0.7"/>
    <circle cx="17" cy="55" r="0.7"/><circle cx="13" cy="53" r="0.7"/>
    <circle cx="25" cy="66" r="0.7"/><circle cx="29" cy="68" r="0.7"/>
    <circle cx="20" cy="79" r="0.7"/>
  </g>

  <!-- crane -->
  <g>
    <!-- tail feathers (black) -->
    <path d="M38,90 Q30,92 24,94 Q30,95 40,94 Z" fill="#0b0b0b"/>
    <!-- body -->
    <ellipse cx="48" cy="88" rx="12" ry="6.5" fill="#fafafa" stroke="#111" stroke-width="0.6"/>
    <!-- wing shade -->
    <path d="M40,86 Q46,82 56,85 Q50,90 42,90 Z" fill="#e0e0e0" stroke="#111" stroke-width="0.4"/>
    <!-- neck -->
    <path d="M54,85 Q58,76 62,67 Q64,62 63,58" stroke="#fafafa" stroke-width="3.8" fill="none" stroke-linecap="round"/>
    <path d="M54,85 Q58,76 62,67 Q64,62 63,58" stroke="#111" stroke-width="0.5" fill="none"/>
    <!-- head -->
    <circle cx="63" cy="57" r="3.2" fill="#fafafa" stroke="#111" stroke-width="0.5"/>
    <!-- red crown -->
    <path d="M61,54 Q63,52 65,54 Q64,56 62,56 Z" fill="#d42020" stroke="#5a0b0b" stroke-width="0.4"/>
    <!-- beak -->
    <polygon points="65,57 70,58 65,59" fill="#1a1a1a"/>
    <!-- eye -->
    <circle cx="62.5" cy="57" r="0.5" fill="#000"/>
    <!-- legs -->
    <line x1="45" y1="94" x2="44" y2="102" stroke="#111" stroke-width="1.1"/>
    <line x1="50" y1="94" x2="51" y2="102" stroke="#111" stroke-width="1.1"/>
    <path d="M42,102 L46,102 M49,102 L53,102" stroke="#111" stroke-width="1" fill="none"/>
  </g>

  <!-- ground line -->
  <path d="M5,103 Q20,100 40,102 Q60,104 75,102" stroke="#3d2817" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- month badge -->
  <g>
    <rect x="5" y="5" width="14" height="12" rx="2" fill="#ffd54a" stroke="#000" stroke-width="0.7"/>
    <text x="12" y="14" font-family="sans-serif" font-size="9" font-weight="700" text-anchor="middle" fill="#111">1</text>
  </g>
  <!-- type badge -->
  <g>
    <rect x="61" y="5" width="14" height="12" rx="2" fill="#b8860b" stroke="#000" stroke-width="0.7"/>
    <text x="68" y="14.5" font-family="sans-serif" font-size="8" font-weight="700" text-anchor="middle" fill="#fff">光</text>
  </g>
</svg>
