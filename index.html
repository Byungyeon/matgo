<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>맞고 (Go-Stop)</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header class="top">
    <div class="player-info opp">
      <div class="who">상대 (CPU)</div>
      <div class="score">점수: <span id="opp-score">0</span></div>
      <div class="captured" id="opp-captured"></div>
    </div>
    <div class="status">
      <div id="round-info">남은 패: <span id="deck-count">0</span></div>
      <div id="turn-info">차례: <span id="turn-name">-</span></div>
      <div id="message" class="msg"></div>
    </div>
    <div class="player-info me">
      <div class="who">나</div>
      <div class="score">점수: <span id="me-score">0</span></div>
      <div class="captured" id="me-captured"></div>
    </div>
  </header>

  <section class="opp-hand-row">
    <div id="opp-hand" class="hand opp-hand"></div>
  </section>

  <section class="field-row">
    <div id="field" class="field"></div>
    <div class="deck-stack">
      <div id="deck" class="card-back deck"></div>
      <div id="flip" class="flip-slot"></div>
    </div>
  </section>

  <section class="my-hand-row">
    <div id="my-hand" class="hand my-hand"></div>
  </section>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-actions" class="modal-actions"></div>
    </div>
  </div>

  <div class="controls">
    <button id="reset">새 게임</button>
    <button id="rules-btn">규칙</button>
  </div>
  <footer class="attribution">
    카드 이미지: <a href="https://commons.wikimedia.org/wiki/Category:SVG_Hwatu" target="_blank" rel="noopener">SVG Hwatu</a> by Spenĉjo / Marcus Richert, <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank" rel="noopener">CC BY-SA 4.0</a>
  </footer>
</div>
<script src="game.js"></script>
</body>
</html>
